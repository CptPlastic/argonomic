<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Thank You — AG</title>
    <meta name="description" content="Thank you for contacting AG." />
    <meta name="robots" content="noindex" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600&family=Syne:wght@600;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="css/thank-you.css" />
  </head>
  <body>
    <div class="grain" aria-hidden="true"></div>
    <div class="ambient ambient--one" aria-hidden="true"></div>
    <div class="ambient ambient--two" aria-hidden="true"></div>

    <header class="thank-nav">
      <a class="thank-nav__brand" href="index.html" aria-label="AG home">AG</a>
      <p><span></span> Message received</p>
    </header>

    <main class="thank-main">
      <div class="signal" aria-hidden="true">
        <div class="signal__orbit signal__orbit--outer"></div>
        <div class="signal__orbit signal__orbit--inner"></div>
        <div class="signal__core">
          <svg viewBox="0 0 96 96" role="presentation">
            <circle class="signal__ring" cx="48" cy="48" r="43" />
            <path class="signal__check" d="M27 49.5 41.5 64 70 34" />
          </svg>
        </div>
        <span class="signal__node signal__node--one"></span>
        <span class="signal__node signal__node--two"></span>
      </div>

      <div class="thank-copy">
        <p class="eyebrow">Transmission complete</p>
        <h1>Thank you.</h1>
        <p class="thank-copy__lede">
          Your message is with the AG team. We’ll review it and get back to you soon.
        </p>
        <a class="return-link" href="index.html">
          <span>Return to AG</span>
          <svg viewBox="0 0 20 20" aria-hidden="true">
            <path d="M4 10h12M11 5l5 5-5 5" />
          </svg>
        </a>
      </div>

      <div class="system-line" aria-hidden="true">
        <span>AG / CONTACT</span>
        <i></i>
        <span>RECEIVED</span>
      </div>
    </main>
  </body>
</html>
