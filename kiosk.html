<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AG — System Simulation</title>
    <meta name="description" content="AG booth display — thermally controlled plant nursery system simulation." />
    <meta name="robots" content="noindex" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600&family=Space+Grotesk:wght@600;700&family=Syne:wght@600;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="css/kiosk.css" />
  </head>
  <body class="kiosk" data-mode="cool">
    <div class="grain" aria-hidden="true"></div>
    <div class="scanlines" aria-hidden="true"></div>

    <header class="kiosk-bar">
      <a class="kiosk-bar__brand" href="index.html">AG</a>
      <p class="kiosk-bar__status">
        <span class="pulse-dot" aria-hidden="true"></span>
        <span data-feed-status>SYSTEM SIMULATION</span>
      </p>
      <p class="kiosk-bar__meta">US 2024/0407307 A1</p>
    </header>

    <main class="kiosk-stage">
      <aside class="hud hud--left">
        <div class="hud__block">
          <p class="hud__label">Root zone</p>
          <p class="hud__value"><span data-root-temp>64.2</span><small>°F</small></p>
          <div class="hud__meter"><span data-root-meter style="width: 62%"></span></div>
        </div>
        <div class="hud__block">
          <p class="hud__label">Chamber RH</p>
          <p class="hud__value"><span data-rh>71</span><small>%</small></p>
          <div class="hud__meter"><span data-rh-meter style="width: 71%"></span></div>
        </div>
        <div class="hud__block">
          <p class="hud__label">Cycle</p>
          <p class="hud__value hud__value--text" data-cycle>COOLING</p>
        </div>
        <div class="hud__block">
          <p class="hud__label">Power</p>
          <p class="hud__value hud__value--text" data-power>SOLAR</p>
        </div>
      </aside>

      <div class="viz" aria-hidden="true">
        <div class="viz__bloom"></div>
        <div class="viz__frame">
          <div class="viz__grid"></div>

          <!--
            Bay centers (shared by fans / nozzles / pots / plants):
            250 · 400 · 550 · 700
          -->
          <svg class="viz__schematic" viewBox="0 0 1000 640" preserveAspectRatio="xMidYMid meet">
            <defs>
              <linearGradient id="coilGrad" x1="0" y1="0" x2="1" y2="0">
                <stop offset="0%" stop-color="#7ef0de" />
                <stop offset="100%" stop-color="#2f9a74" />
              </linearGradient>
              <linearGradient id="leafGrad" x1="0" y1="0" x2="0" y2="1">
                <stop offset="0%" stop-color="#8fe6a0" />
                <stop offset="100%" stop-color="#3f9a63" />
              </linearGradient>
              <linearGradient id="waterGrad" x1="0" y1="0" x2="0" y2="1">
                <stop offset="0%" stop-color="#5fe0d0" stop-opacity="0.55" />
                <stop offset="100%" stop-color="#2f9a74" stop-opacity="0.28" />
              </linearGradient>
              <linearGradient id="soilGrad" x1="0" y1="0" x2="0" y2="1">
                <stop offset="0%" stop-color="#3a2c1e" />
                <stop offset="100%" stop-color="#1c150e" />
              </linearGradient>
              <filter id="soft" x="-60%" y="-60%" width="220%" height="220%">
                <feGaussianBlur stdDeviation="2.5" result="b" />
                <feMerge><feMergeNode in="b" /><feMergeNode in="SourceGraphic" /></feMerge>
              </filter>

              <!-- cylindrical breathing container -->
              <g id="pot">
                <path class="pot-body" d="M-42 0 V98 Q-42 116 -24 120 H24 Q42 116 42 98 V0" />
                <ellipse class="pot-soil" cx="0" cy="0" rx="42" ry="11" fill="url(#soilGrad)" />
                <ellipse class="pot-rim" cx="0" cy="0" rx="42" ry="11" />
                <rect class="pot-slot" x="-28" y="28" width="6" height="16" rx="3" />
                <rect class="pot-slot" x="-10" y="28" width="6" height="16" rx="3" />
                <rect class="pot-slot" x="8" y="28" width="6" height="16" rx="3" />
                <rect class="pot-slot" x="26" y="28" width="6" height="16" rx="3" />
                <rect class="pot-slot" x="-28" y="62" width="6" height="16" rx="3" />
                <rect class="pot-slot" x="-10" y="62" width="6" height="16" rx="3" />
                <rect class="pot-slot" x="8" y="62" width="6" height="16" rx="3" />
                <rect class="pot-slot" x="26" y="62" width="6" height="16" rx="3" />
              </g>

              <g id="coilset">
                <ellipse class="coil-ring" cx="0" cy="24" rx="47" ry="12" />
                <ellipse class="coil-ring" cx="0" cy="52" rx="47" ry="12" />
                <ellipse class="coil-ring" cx="0" cy="80" rx="47" ry="12" />
              </g>

              <g id="seed">
                <path class="root" d="M0 2 C -5 38 -16 66 -24 98" />
                <path class="root" d="M0 2 C 5 38 15 64 22 96" />
                <path class="root" d="M0 2 C -1 44 1 76 1 106" />
                <path class="stem" d="M0 0 C -2 -20 2 -42 0 -64" />
                <path class="leaf" d="M-1 -24 C -16 -30 -30 -24 -34 -10 C -22 -16 -8 -20 -1 -24 Z" />
                <path class="leaf" d="M1 -24 C 16 -30 30 -24 34 -10 C 22 -16 8 -20 1 -24 Z" />
                <path class="leaf" d="M-1 -46 C -13 -52 -24 -47 -28 -34 C -18 -39 -7 -43 -1 -46 Z" />
                <path class="leaf" d="M1 -46 C 13 -52 24 -47 28 -34 C 18 -39 7 -43 1 -46 Z" />
                <path class="bud" d="M0 -64 C -5 -72 0 -82 0 -82 C 0 -82 5 -72 0 -64 Z" />
              </g>

              <!-- fan with SMIL spin so it stays centered -->
              <g id="fan">
                <circle class="fan-housing" r="26" />
                <g class="fan-blades">
                  <path d="M0 -2 C 10 -12 20 -11 26 -1 C 16 -2 7 0 0 -2 Z" />
                  <path d="M0 -2 C 10 -12 20 -11 26 -1 C 16 -2 7 0 0 -2 Z" transform="rotate(120)" />
                  <path d="M0 -2 C 10 -12 20 -11 26 -1 C 16 -2 7 0 0 -2 Z" transform="rotate(240)" />
                  <animateTransform attributeName="transform" type="rotate" from="0" to="360" dur="1.2s" repeatCount="indefinite" />
                </g>
                <circle class="fan-hub" r="4.5" />
              </g>

            </defs>

            <!-- housing -->
            <rect class="housing" x="120" y="48" width="760" height="544" rx="28" />
            <rect class="chamber" x="156" y="86" width="688" height="348" rx="14" />
            <text class="mark" x="500" y="38" text-anchor="middle">AG</text>

            <!-- fans — one per bay -->
            <use href="#fan" x="250" y="128" />
            <use href="#fan" x="400" y="128" />
            <use href="#fan" x="550" y="128" />
            <use href="#fan" x="700" y="128" />

            <!-- mist manifold + nozzles on bay centers -->
            <path class="manifold" d="M210 172 H790" />
            <g class="nozzles">
              <line class="nozzle-stub" x1="250" y1="172" x2="250" y2="186" />
              <line class="nozzle-stub" x1="400" y1="172" x2="400" y2="186" />
              <line class="nozzle-stub" x1="550" y1="172" x2="550" y2="186" />
              <line class="nozzle-stub" x1="700" y1="172" x2="700" y2="186" />
              <circle class="nozzle" cx="250" cy="188" r="3.5" />
              <circle class="nozzle" cx="400" cy="188" r="3.5" />
              <circle class="nozzle" cx="550" cy="188" r="3.5" />
              <circle class="nozzle" cx="700" cy="188" r="3.5" />
            </g>

            <!-- cool airflow: fan → canopy (only visible in cool) -->
            <g class="fx fx--cool">
              <g transform="translate(250 154)">
                <line class="air" x1="0" y1="0" x2="0" y2="16">
                  <animate attributeName="y1" values="0;108" dur="1.8s" begin="0s" repeatCount="indefinite" />
                  <animate attributeName="y2" values="16;124" dur="1.8s" begin="0s" repeatCount="indefinite" />
                  <animate attributeName="opacity" values="0;0.9;0" keyTimes="0;0.3;1" dur="1.8s" begin="0s" repeatCount="indefinite" />
                </line>
                <line class="air" x1="-10" y1="0" x2="-10" y2="14">
                  <animate attributeName="y1" values="0;108" dur="1.8s" begin="0.6s" repeatCount="indefinite" />
                  <animate attributeName="y2" values="14;122" dur="1.8s" begin="0.6s" repeatCount="indefinite" />
                  <animate attributeName="opacity" values="0;0.7;0" keyTimes="0;0.3;1" dur="1.8s" begin="0.6s" repeatCount="indefinite" />
                </line>
              </g>
              <g transform="translate(400 154)">
                <line class="air" x1="0" y1="0" x2="0" y2="16">
                  <animate attributeName="y1" values="0;108" dur="1.8s" begin="0.3s" repeatCount="indefinite" />
                  <animate attributeName="y2" values="16;124" dur="1.8s" begin="0.3s" repeatCount="indefinite" />
                  <animate attributeName="opacity" values="0;0.9;0" keyTimes="0;0.3;1" dur="1.8s" begin="0.3s" repeatCount="indefinite" />
                </line>
                <line class="air" x1="10" y1="0" x2="10" y2="14">
                  <animate attributeName="y1" values="0;108" dur="1.8s" begin="0.9s" repeatCount="indefinite" />
                  <animate attributeName="y2" values="14;122" dur="1.8s" begin="0.9s" repeatCount="indefinite" />
                  <animate attributeName="opacity" values="0;0.7;0" keyTimes="0;0.3;1" dur="1.8s" begin="0.9s" repeatCount="indefinite" />
                </line>
              </g>
              <g transform="translate(550 154)">
                <line class="air" x1="0" y1="0" x2="0" y2="16">
                  <animate attributeName="y1" values="0;108" dur="1.8s" begin="0.15s" repeatCount="indefinite" />
                  <animate attributeName="y2" values="16;124" dur="1.8s" begin="0.15s" repeatCount="indefinite" />
                  <animate attributeName="opacity" values="0;0.9;0" keyTimes="0;0.3;1" dur="1.8s" begin="0.15s" repeatCount="indefinite" />
                </line>
                <line class="air" x1="-8" y1="0" x2="-8" y2="14">
                  <animate attributeName="y1" values="0;108" dur="1.8s" begin="0.75s" repeatCount="indefinite" />
                  <animate attributeName="y2" values="14;122" dur="1.8s" begin="0.75s" repeatCount="indefinite" />
                  <animate attributeName="opacity" values="0;0.7;0" keyTimes="0;0.3;1" dur="1.8s" begin="0.75s" repeatCount="indefinite" />
                </line>
              </g>
              <g transform="translate(700 154)">
                <line class="air" x1="0" y1="0" x2="0" y2="16">
                  <animate attributeName="y1" values="0;108" dur="1.8s" begin="0.45s" repeatCount="indefinite" />
                  <animate attributeName="y2" values="16;124" dur="1.8s" begin="0.45s" repeatCount="indefinite" />
                  <animate attributeName="opacity" values="0;0.9;0" keyTimes="0;0.3;1" dur="1.8s" begin="0.45s" repeatCount="indefinite" />
                </line>
                <line class="air" x1="8" y1="0" x2="8" y2="14">
                  <animate attributeName="y1" values="0;108" dur="1.8s" begin="1.05s" repeatCount="indefinite" />
                  <animate attributeName="y2" values="14;122" dur="1.8s" begin="1.05s" repeatCount="indefinite" />
                  <animate attributeName="opacity" values="0;0.7;0" keyTimes="0;0.3;1" dur="1.8s" begin="1.05s" repeatCount="indefinite" />
                </line>
              </g>
            </g>

            <!-- mist drops + haze (only mist) -->
            <g class="fx fx--mist">
              <ellipse class="mist-haze" cx="500" cy="240" rx="300" ry="70" />
              <ellipse class="mist-haze" cx="500" cy="280" rx="280" ry="50" style="animation-delay:0.6s" />
              <g transform="translate(250 190)">
                <circle class="drop" r="2.4"><animate attributeName="cy" values="0;78" dur="1.2s" begin="0s" repeatCount="indefinite" /><animate attributeName="opacity" values="0;1;1;0" keyTimes="0;0.08;0.7;1" dur="1.2s" begin="0s" repeatCount="indefinite" /></circle>
                <circle class="drop" r="1.7" cx="-8"><animate attributeName="cy" values="0;78" dur="1.2s" begin="0.25s" repeatCount="indefinite" /><animate attributeName="opacity" values="0;1;1;0" keyTimes="0;0.08;0.7;1" dur="1.2s" begin="0.25s" repeatCount="indefinite" /></circle>
                <circle class="drop" r="1.7" cx="8"><animate attributeName="cy" values="0;78" dur="1.2s" begin="0.5s" repeatCount="indefinite" /><animate attributeName="opacity" values="0;1;1;0" keyTimes="0;0.08;0.7;1" dur="1.2s" begin="0.5s" repeatCount="indefinite" /></circle>
                <circle class="drop" r="1.4" cx="-4"><animate attributeName="cy" values="0;78" dur="1.2s" begin="0.75s" repeatCount="indefinite" /><animate attributeName="opacity" values="0;1;1;0" keyTimes="0;0.08;0.7;1" dur="1.2s" begin="0.75s" repeatCount="indefinite" /></circle>
                <circle class="drop" r="1.4" cx="5"><animate attributeName="cy" values="0;78" dur="1.2s" begin="1s" repeatCount="indefinite" /><animate attributeName="opacity" values="0;1;1;0" keyTimes="0;0.08;0.7;1" dur="1.2s" begin="1s" repeatCount="indefinite" /></circle>
                <circle class="drop" r="1.2" cx="-12"><animate attributeName="cy" values="0;70" dur="1.35s" begin="0.35s" repeatCount="indefinite" /><animate attributeName="opacity" values="0;1;1;0" keyTimes="0;0.08;0.7;1" dur="1.35s" begin="0.35s" repeatCount="indefinite" /></circle>
                <circle class="drop" r="1.2" cx="12"><animate attributeName="cy" values="0;70" dur="1.35s" begin="0.85s" repeatCount="indefinite" /><animate attributeName="opacity" values="0;1;1;0" keyTimes="0;0.08;0.7;1" dur="1.35s" begin="0.85s" repeatCount="indefinite" /></circle>
              </g>
              <g transform="translate(400 190)">
                <circle class="drop" r="2.4"><animate attributeName="cy" values="0;78" dur="1.2s" begin="0.15s" repeatCount="indefinite" /><animate attributeName="opacity" values="0;1;1;0" keyTimes="0;0.08;0.7;1" dur="1.2s" begin="0.15s" repeatCount="indefinite" /></circle>
                <circle class="drop" r="1.7" cx="-8"><animate attributeName="cy" values="0;78" dur="1.2s" begin="0.4s" repeatCount="indefinite" /><animate attributeName="opacity" values="0;1;1;0" keyTimes="0;0.08;0.7;1" dur="1.2s" begin="0.4s" repeatCount="indefinite" /></circle>
                <circle class="drop" r="1.7" cx="8"><animate attributeName="cy" values="0;78" dur="1.2s" begin="0.65s" repeatCount="indefinite" /><animate attributeName="opacity" values="0;1;1;0" keyTimes="0;0.08;0.7;1" dur="1.2s" begin="0.65s" repeatCount="indefinite" /></circle>
                <circle class="drop" r="1.4" cx="-4"><animate attributeName="cy" values="0;78" dur="1.2s" begin="0.9s" repeatCount="indefinite" /><animate attributeName="opacity" values="0;1;1;0" keyTimes="0;0.08;0.7;1" dur="1.2s" begin="0.9s" repeatCount="indefinite" /></circle>
                <circle class="drop" r="1.4" cx="5"><animate attributeName="cy" values="0;78" dur="1.2s" begin="1.1s" repeatCount="indefinite" /><animate attributeName="opacity" values="0;1;1;0" keyTimes="0;0.08;0.7;1" dur="1.2s" begin="1.1s" repeatCount="indefinite" /></circle>
                <circle class="drop" r="1.2" cx="-12"><animate attributeName="cy" values="0;70" dur="1.35s" begin="0.5s" repeatCount="indefinite" /><animate attributeName="opacity" values="0;1;1;0" keyTimes="0;0.08;0.7;1" dur="1.35s" begin="0.5s" repeatCount="indefinite" /></circle>
                <circle class="drop" r="1.2" cx="12"><animate attributeName="cy" values="0;70" dur="1.35s" begin="1s" repeatCount="indefinite" /><animate attributeName="opacity" values="0;1;1;0" keyTimes="0;0.08;0.7;1" dur="1.35s" begin="1s" repeatCount="indefinite" /></circle>
              </g>
              <g transform="translate(550 190)">
                <circle class="drop" r="2.4"><animate attributeName="cy" values="0;78" dur="1.2s" begin="0.08s" repeatCount="indefinite" /><animate attributeName="opacity" values="0;1;1;0" keyTimes="0;0.08;0.7;1" dur="1.2s" begin="0.08s" repeatCount="indefinite" /></circle>
                <circle class="drop" r="1.7" cx="-8"><animate attributeName="cy" values="0;78" dur="1.2s" begin="0.33s" repeatCount="indefinite" /><animate attributeName="opacity" values="0;1;1;0" keyTimes="0;0.08;0.7;1" dur="1.2s" begin="0.33s" repeatCount="indefinite" /></circle>
                <circle class="drop" r="1.7" cx="8"><animate attributeName="cy" values="0;78" dur="1.2s" begin="0.58s" repeatCount="indefinite" /><animate attributeName="opacity" values="0;1;1;0" keyTimes="0;0.08;0.7;1" dur="1.2s" begin="0.58s" repeatCount="indefinite" /></circle>
                <circle class="drop" r="1.4" cx="-4"><animate attributeName="cy" values="0;78" dur="1.2s" begin="0.83s" repeatCount="indefinite" /><animate attributeName="opacity" values="0;1;1;0" keyTimes="0;0.08;0.7;1" dur="1.2s" begin="0.83s" repeatCount="indefinite" /></circle>
                <circle class="drop" r="1.4" cx="5"><animate attributeName="cy" values="0;78" dur="1.2s" begin="1.05s" repeatCount="indefinite" /><animate attributeName="opacity" values="0;1;1;0" keyTimes="0;0.08;0.7;1" dur="1.2s" begin="1.05s" repeatCount="indefinite" /></circle>
                <circle class="drop" r="1.2" cx="-12"><animate attributeName="cy" values="0;70" dur="1.35s" begin="0.45s" repeatCount="indefinite" /><animate attributeName="opacity" values="0;1;1;0" keyTimes="0;0.08;0.7;1" dur="1.35s" begin="0.45s" repeatCount="indefinite" /></circle>
                <circle class="drop" r="1.2" cx="12"><animate attributeName="cy" values="0;70" dur="1.35s" begin="0.95s" repeatCount="indefinite" /><animate attributeName="opacity" values="0;1;1;0" keyTimes="0;0.08;0.7;1" dur="1.35s" begin="0.95s" repeatCount="indefinite" /></circle>
              </g>
              <g transform="translate(700 190)">
                <circle class="drop" r="2.4"><animate attributeName="cy" values="0;78" dur="1.2s" begin="0.22s" repeatCount="indefinite" /><animate attributeName="opacity" values="0;1;1;0" keyTimes="0;0.08;0.7;1" dur="1.2s" begin="0.22s" repeatCount="indefinite" /></circle>
                <circle class="drop" r="1.7" cx="-8"><animate attributeName="cy" values="0;78" dur="1.2s" begin="0.47s" repeatCount="indefinite" /><animate attributeName="opacity" values="0;1;1;0" keyTimes="0;0.08;0.7;1" dur="1.2s" begin="0.47s" repeatCount="indefinite" /></circle>
                <circle class="drop" r="1.7" cx="8"><animate attributeName="cy" values="0;78" dur="1.2s" begin="0.72s" repeatCount="indefinite" /><animate attributeName="opacity" values="0;1;1;0" keyTimes="0;0.08;0.7;1" dur="1.2s" begin="0.72s" repeatCount="indefinite" /></circle>
                <circle class="drop" r="1.4" cx="-4"><animate attributeName="cy" values="0;78" dur="1.2s" begin="0.97s" repeatCount="indefinite" /><animate attributeName="opacity" values="0;1;1;0" keyTimes="0;0.08;0.7;1" dur="1.2s" begin="0.97s" repeatCount="indefinite" /></circle>
                <circle class="drop" r="1.4" cx="5"><animate attributeName="cy" values="0;78" dur="1.2s" begin="1.15s" repeatCount="indefinite" /><animate attributeName="opacity" values="0;1;1;0" keyTimes="0;0.08;0.7;1" dur="1.2s" begin="1.15s" repeatCount="indefinite" /></circle>
                <circle class="drop" r="1.2" cx="-12"><animate attributeName="cy" values="0;70" dur="1.35s" begin="0.6s" repeatCount="indefinite" /><animate attributeName="opacity" values="0;1;1;0" keyTimes="0;0.08;0.7;1" dur="1.35s" begin="0.6s" repeatCount="indefinite" /></circle>
                <circle class="drop" r="1.2" cx="12"><animate attributeName="cy" values="0;70" dur="1.35s" begin="1.1s" repeatCount="indefinite" /><animate attributeName="opacity" values="0;1;1;0" keyTimes="0;0.08;0.7;1" dur="1.35s" begin="1.1s" repeatCount="indefinite" /></circle>
              </g>
            </g>

            <!-- pots / coils / plants — all on bay centers, soil at y=290 -->
            <use href="#pot" x="250" y="290" />
            <use href="#pot" x="400" y="290" />
            <use href="#pot" x="550" y="290" />
            <use href="#pot" x="700" y="290" />

            <g class="coils">
              <use href="#coilset" x="250" y="290" />
              <use href="#coilset" x="400" y="290" />
              <use href="#coilset" x="550" y="290" />
              <use href="#coilset" x="700" y="290" />
            </g>

            <g transform="translate(250 290)"><g class="plant"><use href="#seed" /></g></g>
            <g transform="translate(400 290)"><g class="plant plant--b"><use href="#seed" /></g></g>
            <g transform="translate(550 290)"><g class="plant plant--c"><use href="#seed" /></g></g>
            <g transform="translate(700 290)"><g class="plant plant--d"><use href="#seed" /></g></g>

            <!-- UV lamp strip — centered over the 4 bays (cx=500) -->
            <rect class="uv-lamp" x="230" y="92" width="540" height="6" rx="3" />
            <rect class="uv-wash" x="168" y="104" width="664" height="314" rx="12" />
            <g class="fx fx--sanitize">
              <circle class="uv-orb" cx="250" cy="150" r="10">
                <animate attributeName="opacity" values="0.35;1;0.35" dur="1.6s" begin="0s" repeatCount="indefinite" />
                <animate attributeName="r" values="8;12;8" dur="1.6s" begin="0s" repeatCount="indefinite" />
              </circle>
              <circle class="uv-orb" cx="400" cy="150" r="10">
                <animate attributeName="opacity" values="0.35;1;0.35" dur="1.6s" begin="0.3s" repeatCount="indefinite" />
                <animate attributeName="r" values="8;12;8" dur="1.6s" begin="0.3s" repeatCount="indefinite" />
              </circle>
              <circle class="uv-orb" cx="550" cy="150" r="10">
                <animate attributeName="opacity" values="0.35;1;0.35" dur="1.6s" begin="0.6s" repeatCount="indefinite" />
                <animate attributeName="r" values="8;12;8" dur="1.6s" begin="0.6s" repeatCount="indefinite" />
              </circle>
              <circle class="uv-orb" cx="700" cy="150" r="10">
                <animate attributeName="opacity" values="0.35;1;0.35" dur="1.6s" begin="0.9s" repeatCount="indefinite" />
                <animate attributeName="r" values="8;12;8" dur="1.6s" begin="0.9s" repeatCount="indefinite" />
              </circle>
              <circle class="uv-orb" cx="325" cy="320" r="6">
                <animate attributeName="opacity" values="0.2;0.8;0.2" dur="2s" begin="0.2s" repeatCount="indefinite" />
              </circle>
              <circle class="uv-orb" cx="500" cy="340" r="7">
                <animate attributeName="opacity" values="0.2;0.8;0.2" dur="2s" begin="0.7s" repeatCount="indefinite" />
              </circle>
              <circle class="uv-orb" cx="675" cy="320" r="6">
                <animate attributeName="opacity" values="0.2;0.8;0.2" dur="2s" begin="1.2s" repeatCount="indefinite" />
              </circle>
            </g>

            <!-- reservoir — fill + heater share the same vertical center (498) -->
            <text class="tank-label" x="190" y="462" text-anchor="start">RESERVOIR</text>
            <rect class="tank" x="186" y="470" width="628" height="56" rx="12" />
            <rect class="tank-fill" x="198" y="480" width="604" height="36" rx="8" fill="url(#waterGrad)" />
            <rect class="tank-heatwash" x="198" y="480" width="604" height="36" rx="8" />
            <g transform="translate(500 498)">
              <path
                class="heater"
                d="M-230 0
                   C -192 -15, -154 15, -115 0
                   S -38 -15, 0 0
                   S 77 15, 115 0
                   S 192 -15, 230 0"
              />
            </g>

            <!-- heat rising from tank (only heat) — aligned to bay centers -->
            <g class="fx fx--heat">
              <path class="heatwave" d="M250 476 q 5 -10 0 -20 q -5 -10 0 -20">
                <animate attributeName="opacity" values="0;1;0" dur="1.8s" begin="0s" repeatCount="indefinite" />
                <animateTransform attributeName="transform" type="translate" values="0 0; 0 -22" dur="1.8s" begin="0s" repeatCount="indefinite" />
              </path>
              <path class="heatwave" d="M400 476 q 5 -10 0 -20 q -5 -10 0 -20">
                <animate attributeName="opacity" values="0;1;0" dur="1.8s" begin="0.35s" repeatCount="indefinite" />
                <animateTransform attributeName="transform" type="translate" values="0 0; 0 -22" dur="1.8s" begin="0.35s" repeatCount="indefinite" />
              </path>
              <path class="heatwave" d="M550 476 q 5 -10 0 -20 q -5 -10 0 -20">
                <animate attributeName="opacity" values="0;1;0" dur="1.8s" begin="0.7s" repeatCount="indefinite" />
                <animateTransform attributeName="transform" type="translate" values="0 0; 0 -22" dur="1.8s" begin="0.7s" repeatCount="indefinite" />
              </path>
              <path class="heatwave" d="M700 476 q 5 -10 0 -20 q -5 -10 0 -20">
                <animate attributeName="opacity" values="0;1;0" dur="1.8s" begin="1.05s" repeatCount="indefinite" />
                <animateTransform attributeName="transform" type="translate" values="0 0; 0 -22" dur="1.8s" begin="1.05s" repeatCount="indefinite" />
              </path>
              <path class="heatwave" d="M325 476 q 5 -10 0 -20 q -5 -10 0 -20">
                <animate attributeName="opacity" values="0;0.8;0" dur="1.8s" begin="0.2s" repeatCount="indefinite" />
                <animateTransform attributeName="transform" type="translate" values="0 0; 0 -18" dur="1.8s" begin="0.2s" repeatCount="indefinite" />
              </path>
              <path class="heatwave" d="M475 476 q 5 -10 0 -20 q -5 -10 0 -20">
                <animate attributeName="opacity" values="0;0.8;0" dur="1.8s" begin="0.55s" repeatCount="indefinite" />
                <animateTransform attributeName="transform" type="translate" values="0 0; 0 -18" dur="1.8s" begin="0.55s" repeatCount="indefinite" />
              </path>
              <path class="heatwave" d="M625 476 q 5 -10 0 -20 q -5 -10 0 -20">
                <animate attributeName="opacity" values="0;0.8;0" dur="1.8s" begin="0.9s" repeatCount="indefinite" />
                <animateTransform attributeName="transform" type="translate" values="0 0; 0 -18" dur="1.8s" begin="0.9s" repeatCount="indefinite" />
              </path>
            </g>

            <!-- recycle loop: tank → riser → manifold + arrows -->
            <path class="supply" d="M210 498 V172 H790" fill="none" />
            <g class="fx fx--recycle">
              <circle class="flow-bead" r="5" filter="url(#soft)">
                <animateMotion dur="3.2s" repeatCount="indefinite" path="M210 498 V172 H790" />
              </circle>
              <circle class="flow-bead" r="4" filter="url(#soft)">
                <animateMotion dur="3.2s" begin="1.05s" repeatCount="indefinite" path="M210 498 V172 H790" />
              </circle>
              <circle class="flow-bead" r="4" filter="url(#soft)">
                <animateMotion dur="3.2s" begin="2.1s" repeatCount="indefinite" path="M210 498 V172 H790" />
              </circle>

              <!-- directional arrows along the loop -->
              <polygon class="recycle-arrow" points="210,430 204,444 216,444" />
              <polygon class="recycle-arrow" points="210,320 204,334 216,334" />
              <polygon class="recycle-arrow" points="210,220 204,234 216,234" />
              <polygon class="recycle-arrow" points="320,172 306,166 306,178" />
              <polygon class="recycle-arrow" points="500,172 486,166 486,178" />
              <polygon class="recycle-arrow" points="680,172 666,166 666,178" />

              <!-- spinning recycle mark -->
              <g transform="translate(820 300)">
                <g class="recycle-mark">
                  <path d="M-14 -6 a16 16 0 1 1 -4 18" />
                  <polygon class="recycle-arrow" points="-18,14 -8,18 -14,6" />
                  <path d="M14 6 a16 16 0 1 1 4 -18" />
                  <polygon class="recycle-arrow" points="18,-14 8,-18 14,-6" />
                  <animateTransform attributeName="transform" type="rotate" from="0" to="360" dur="4s" repeatCount="indefinite" />
                </g>
              </g>
            </g>

            <!-- control readout -->
            <rect class="control" x="430" y="540" width="140" height="28" rx="8" />
            <text class="control-temp" x="500" y="559" text-anchor="middle" data-screen-temp>64°</text>
          </svg>

          <div class="viz__readout">
            <span class="viz__badge" data-phase-badge>COOL</span>
            <p class="viz__phase" data-phase-label>Direct-to-root cooling</p>
          </div>
        </div>
      </div>

      <aside class="hud hud--right">
        <div class="hud__block">
          <p class="hud__label">Biosecurity</p>
          <p class="hud__value hud__value--text" data-bio>STANDBY</p>
        </div>
        <div class="hud__block">
          <p class="hud__label">Water loop</p>
          <p class="hud__value hud__value--text" data-water>IDLE</p>
        </div>
        <div class="hud__block">
          <p class="hud__label">Compressor</p>
          <p class="hud__value"><span data-comp>42</span><small>%</small></p>
          <div class="hud__meter"><span data-comp-meter style="width: 42%"></span></div>
        </div>
        <div class="hud__block">
          <p class="hud__label">Uptime</p>
          <p class="hud__value hud__value--text" data-uptime>00:00:00</p>
        </div>
      </aside>
    </main>

    <footer class="kiosk-foot">
      <div class="phases" data-phases>
        <button type="button" class="is-active" data-phase="0">Cool</button>
        <button type="button" data-phase="1">Heat</button>
        <button type="button" data-phase="2">Mist</button>
        <button type="button" data-phase="3">Sanitize</button>
        <button type="button" data-phase="4">Recycle</button>
      </div>
      <p class="kiosk-foot__tag">Simulation · Press F for fullscreen</p>
    </footer>

    <script src="js/kiosk.js"></script>
  </body>
</html>
